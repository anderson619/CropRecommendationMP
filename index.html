<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Crop Recommendation System – Predict the best crop using SVM and Random Forest ML models." />
  <title>🌾 Crop Recommendation System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="card">
    <!-- Header -->
    <div class="header">
      <span class="icon">🌱</span>
      <h1>Crop Recommendation</h1>
      <p>Ingrese los datos del suelo y clima para obtener la recomendación</p>
    </div>

    <!-- Form -->
    <form id="cropForm" autocomplete="off">
      <div class="form-grid">
        <!-- N -->
        <div class="field">
          <label for="inputN">Nitrógeno (N)</label>
          <input id="inputN" type="number" placeholder="Ej: 90" required />
        </div>
        <!-- P -->
        <div class="field">
          <label for="inputP">Fósforo (P)</label>
          <input id="inputP" type="number" placeholder="Ej: 42" required />
        </div>
        <!-- K -->
        <div class="field">
          <label for="inputK">Potasio (K)</label>
          <input id="inputK" type="number" placeholder="Ej: 43" required />
        </div>
        <!-- Temperature -->
        <div class="field">
          <label for="inputTemp">Temperatura (°C)</label>
          <input id="inputTemp" type="number" step="any" placeholder="Ej: 20.87" required />
        </div>
        <!-- Humidity -->
        <div class="field">
          <label for="inputHum">Humedad (%)</label>
          <input id="inputHum" type="number" step="any" placeholder="Ej: 82.0" required />
        </div>
        <!-- pH -->
        <div class="field">
          <label for="inputPh">pH del suelo</label>
          <input id="inputPh" type="number" step="any" placeholder="Ej: 6.5" required />
        </div>
        <!-- Rainfall -->
        <div class="field full">
          <label for="inputRain">Lluvia (mm)</label>
          <input id="inputRain" type="number" step="any" placeholder="Ej: 202.93" required />
        </div>
        <!-- Model selector -->
        <div class="field full">
          <label for="modelSelect">Modelo de predicción</label>
          <select id="modelSelect">
            <option value="svm">SVM (Support Vector Machine)</option>
            <option value="rf">Random Forest</option>
          </select>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn" id="btnPredict">
        🔍 Predecir Cultivo
      </button>
    </form>

    <!-- Result -->
    <div class="result" id="resultBox">
      <span class="crop-icon" id="resultIcon"></span>
      <div class="crop-name" id="resultCrop"></div>
      <span class="model-badge" id="resultModel"></span>
      <div class="error-text" id="resultError"></div>
    </div>

    <div class="footer">Crop Recommendation API &middot; By Anderson Mantuano &middot; <a
        href="https://github.com/anderson619/CropRecommendationMP/">GitHub</a></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
